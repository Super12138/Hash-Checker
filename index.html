<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no">
    <meta name="renderer" content="webkit">
    <meta name="force-rendering" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <link rel="icon" href="icons/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <meta name="description" content="免费好用且开源的文件校验工具">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mdui/dist/css/mdui.min.css" crossorigin="anonymous">
    <link rel="manifest" href="manifest.json">
    <title>Hash Checker</title>
    <style>
        body::-webkit-scrollbar {
            width: 6px;
            height: 4px
        }

        body::-webkit-scrollbar-thumb {
            border-radius: 15px;
            -webkit-box-shadow: inset 0 0 5px #7d7d7d;
            background: #7d7d7d
        }

        body::-webkit-scrollbar-track {
            -webkit-box-shadow: inset 0 0 5px rgba(0, 0, 0, 0);
            border-radius: 0;
            background: rgba(0, 0, 0, 0)
        }
    </style>
</head>

<body class="mdui-theme-primary-indigo mdui-theme-accent-pink mdui-theme-layout-auto mdui-loaded" id="drop">
    <div class="mdui-container mdui-typo">
        <div class="mdui-row">
            <h1>Hash Checker
                <button type="button" class="mdui-btn mdui-ripple mdui-float-right" id="settingsbtn"
                    mdui-dialog="{target: '#settings'}">
                    <i class="mdui-icon material-icons">&#xe8b8;</i>
                </button>
            </h1>
            <div class="mdui-dialog" id="settings">
                <div class="mdui-dialog-title">设置</div>
                <div class="mdui-dialog-content">你可以在此个性化设置这个应用
                    <br>
                    <br>
                    1MB 单位：
                    <select class="mdui-select" id="mbunit" mdui-select>
                        <option value="nullselect" disabled>在此选择你想使用的 1MB 的单位</option>
                        <option value="1024">1024KB</option>
                        <option value="1000">1000KB</option>
                    </select>
                    <div class="mdui-textfield mdui-textfield-floating-label">
                        <label class="mdui-textfield-label">单次缓存大小</label>
                        <input class="mdui-textfield-input" type="number" id="cachesize" min="1" maxlength="10">
                        <div class="mdui-textfield-helper">在此输入分片缓存文件时单次缓存文件的大小（单位：KB）</div>
                    </div>
                </div>
                <div class="mdui-dialog-actions">
                    <button class="mdui-btn mdui-ripple" id="cancelbtn" mdui-dialog-close>取消</button>
                    <button class="mdui-btn mdui-ripple" id="savebtn" mdui-dialog-confirm>保存</button>
                </div>
            </div>
            <br>
            <div>
                <input id="getfile" type="file" style="display: none;">
                <h1 class="mdui-text-center" id="dragtip" style="display: none;">松开鼠标以读取文件</h1>
                <button class="mdui-btn mdui-btn-block mdui-ripple" id="openfile">点击选择文件</button>
                <p class="mdui-text-center">或者拖拽文件到本页</p>
                <p>
                    文件：<code id="fm">未选择文件</code>&nbsp;&nbsp;
                    大小：<code id="fsize">未选择文件</code>&nbsp;&nbsp;
                    上次修改时间：<code id="fdate">未选择文件</code>&nbsp;&nbsp;
                    <span class="mdui-text-color-red-700" id="etips"></span>
                </p>
                <strong class="mdui-text-color-red-700">本应用的所有操作均在您的计算机上运行，不会收集任何信息，请放心使用！</strong>
                <br>
                <br>
                <label class="mdui-checkbox">
                    <input type="checkbox" id="isclipboard">
                    <i class="mdui-checkbox-icon"></i>
                    计算完成后将校验值写入剪贴板（仅在模式为<code>生成</code>下生效）
                </label>
            </div>
            <br>
            <div>
                方法：
                <select class="mdui-select" id="method" mdui-select>
                    <option value="nullselect" selected disabled>请选择方法...</option>
                    <option value="MD5">MD5</option>
                    <option value="SHA1">SHA1</option>
                    <option value="SHA3">SHA3</option>
                    <option value="SHA256">SHA256</option>
                    <option value="SHA384">SHA384</option>
                    <option value="SHA512">SHA512</option>
                </select>
                &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                模式：
                <select class="mdui-select" id="mod" mdui-select>
                    <option value="nullselect" selected disabled>请选择模式...</option>
                    <option value="check">校验</option>
                    <option value="gen">生成</option>
                </select>
            </div>
            <div class="mdui-textfield mdui-textfield-floating-label">
                <label class="mdui-textfield-label">校验值</label>
                <input class="mdui-textfield-input" id="a" type="text">
                <div class="mdui-textfield-helper">在此处粘贴您获取到的校验值</div>
            </div>
            <br>
            <button class="mdui-btn mdui-btn-block mdui-btn-raised mdui-ripple mdui-color-theme-accent" id="calcbtn">
                <i class="mdui-icon mdui-icon-left material-icons">&#xe877;</i>检查
            </button>
            <br>
            <h1 id="ttitle"></h1>
            <p id="tips"></p>
            <p id="timetip"></p>
            <div class="mdui-progress" id="progress" style="display: none;">
                <div class="mdui-progress-indeterminate" id="progressbar"></div>
            </div>
            <br>
            <footer class="mdui-center mdui-text-center">
                <div class="mdui-divider"></div>
                <p>本应用在<a target="_blank" href="https://github.com/Super12138/Hash-Checker/">GitHub</a>上开源，遵循 GPL-3.0
                    协议<br>由 Super12138 开发</p>
                <p>版本：在线版 - v1.0.8</p>
                <br>
            </footer>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/mdui/dist/js/mdui.min.js" crossorigin="anonymous"></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker
                    .register("service-worker.js")
                    .then((registration) => {
                        console.log("Service Worker 注册成功：", registration);
                    })
                    .catch((registrationError) => {
                        console.error("Service Worker 注册失败：", registrationError);
                    });
            });
        }
    </script>
</body>

</html>
